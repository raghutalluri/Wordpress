- hosts: web
  become: yes

  tasks:
    - name: Collect service facts
      service_facts:

    - name: Verify Apache is running and enabled
      assert:
        that:
          - "'httpd.service' in ansible_facts.services"
          - "ansible_facts.services['httpd.service'].state == 'running'"
          - "ansible_facts.services['httpd.service'].status == 'enabled'"
        fail_msg: "Apache (httpd) is not running and enabled"
        success_msg: "Apache is running and enabled"

    - name: Check WordPress core file exists
      stat:
        path: /var/www/html/wp-load.php
      register: wp_core_file

    - name: Verify WordPress files exist
      assert:
        that:
          - wp_core_file.stat.exists
          - wp_core_file.stat.isreg
        fail_msg: "WordPress core files are missing at /var/www/html"
        success_msg: "WordPress files are present"

    - name: Check wp-config.php exists
      stat:
        path: /var/www/html/wp-config.php
      register: wp_config_file

    - name: Verify wp-config.php exists
      assert:
        that:
          - wp_config_file.stat.exists
          - wp_config_file.stat.isreg
        fail_msg: "wp-config.php is missing"
        success_msg: "wp-config.php exists"

    - name: Verify local HTTP endpoint responds
      uri:
        url: http://127.0.0.1/
        method: GET
        status_code: [200, 301, 302]
        return_content: false
      register: local_http

    - name: Report local HTTP status
      debug:
        msg: "Local HTTP check succeeded with status {{ local_http.status }}"